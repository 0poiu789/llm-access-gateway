x-common: &common
  restart: unless-stopped

services:
  openbao:
    <<: *common
    image: openbao/openbao:latest
    container_name: openbao
    cap_add:
      - IPC_LOCK
    environment:
      BAO_ADDR: "http://0.0.0.0:8200"
      SKIP_SETCAP: "true"
    volumes:
      - ./openbao/config:/openbao/config:ro
      - ./openbao/data:/openbao/data
      - ./openbao/logs:/openbao/logs
    command: server -config=/openbao/config/openbao.hcl
    networks:
      - llm-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8200/v1/sys/health?standbyok=true || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  postgres:
    <<: *common
    image: postgres:16-alpine
    container_name: litellm-db
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # 내부 docker 네트워크 전용이므로 trust 인증 사용.
      # postgres 포트는 호스트에 노출되지 않으며, 같은 docker 네트워크의
      # litellm 컨테이너만 접근 가능하다.
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - llm-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 10s
      timeout: 5s
      retries: 5

  litellm:
    <<: *common
    image: ghcr.io/berriai/litellm-database:main-latest
    container_name: litellm-proxy
    depends_on:
      postgres:
        condition: service_healthy
      openbao:
        condition: service_started
    environment:
      DATABASE_URL: "postgresql://litellm:${POSTGRES_PASSWORD}@postgres:5432/litellm"
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY}"
      PROXY_BASE_URL: "${PROXY_BASE_URL}"

      # 사용자별 OpenAI Key — start.sh가 OpenBao에서 읽어 .env에 동기화한 값
      USER01_OPENAI_KEY: "${USER01_OPENAI_KEY:-}"
      USER02_OPENAI_KEY: "${USER02_OPENAI_KEY:-}"
      USER03_OPENAI_KEY: "${USER03_OPENAI_KEY:-}"
      USER04_OPENAI_KEY: "${USER04_OPENAI_KEY:-}"
      USER05_OPENAI_KEY: "${USER05_OPENAI_KEY:-}"
      USER06_OPENAI_KEY: "${USER06_OPENAI_KEY:-}"
      USER07_OPENAI_KEY: "${USER07_OPENAI_KEY:-}"
      USER08_OPENAI_KEY: "${USER08_OPENAI_KEY:-}"
      USER09_OPENAI_KEY: "${USER09_OPENAI_KEY:-}"
      USER10_OPENAI_KEY: "${USER10_OPENAI_KEY:-}"

      # ※ OIDC SSO 환경변수는 docker-compose.sso.yml에 분리되어 있다.
      # SSO 활성화 시에만 그 override 파일을 함께 사용한다.
      # 이유: LiteLLM OSS는 GENERIC_CLIENT_ID가 빈 값이어도 set되어 있기만 하면
      # Enterprise 라이선스를 요구하므로, 값이 없을 땐 변수 자체를 주입하지 않아야 한다.

      STORE_MODEL_IN_DB: "True"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command: --config /app/config.yaml --port 4000
    networks:
      - llm-net

  nginx:
    <<: *common
    image: nginx:alpine
    container_name: llm-nginx
    depends_on:
      - litellm
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - llm-net

networks:
  llm-net:
    driver: bridge

volumes:
  postgres-data:
