# ══════════════════════════════════════════════════════════
# LiteLLM Proxy — 사용자별 OpenAI Key 매핑 + 24h Virtual Key TTL
# api_key의 "os.environ/USERnn_OPENAI_KEY" 표기는 OpenBao의
#   secret/litellm/USERnn_OPENAI_KEY 의 'key' 필드로 해석된다.
# ══════════════════════════════════════════════════════════

model_list:
  # User 01
  - model_name: user01-gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: "os.environ/USER01_OPENAI_KEY"
