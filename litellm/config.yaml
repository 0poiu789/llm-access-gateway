general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
  database_url: "os.environ/DATABASE_URL"
  proxy_base_url: "os.environ/PROXY_BASE_URL"

  # 주의: LiteLLM OSS는 Hashicorp Vault 연동을 지원하지 않으므로
  # USERnn_OPENAI_KEY는 start.sh가 OpenBao → .env → 컨테이너 env 로 전달한다.
  # OpenBao는 여전히 시크릿의 source of truth로 유지된다.

  # 입출력 로그
  store_model_in_db: true
  store_prompts_in_spend_logs: true
  maximum_spend_logs_retention_period: "90d"
  maximum_spend_logs_retention_interval: "1d"

  # 사용자 셀프서비스 + Default 24h Key TTL
  allow_user_auth: true
  default_key_generate_params:
    duration: "24h"


router_settings:
  num_retries: 2
  timeout: 120

litellm_settings:
  drop_params: true
  set_verbose: false
